<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Nueva Solicitud</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/crearSolicitud}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Peso (kg)</label>
                    <input type="number" step="0.01" name="peso" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ubicación</label>
                    <input type="text" name="ubicacion" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Región</label>
                    <input type="text" name="region" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Trabajo</label>
                    <select name="tipo" class="form-select" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option th:each="t : ${listaTipos}" 
                                th:value="${t.nombreTrabajo}" 
                                th:text="${t.nombreTrabajo}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">RUT Empresa Proveedora</label>
                    <input type="text" name="rutEmpresaProveedora" class="form-control" placeholder="Ej: 12.345.678-9" required>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Crear Solicitud</button>
                    <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
