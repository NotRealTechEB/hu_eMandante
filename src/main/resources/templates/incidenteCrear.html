<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportar Incidente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Reportar Nuevo Incidente</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/crearIncidentes}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Tipo de Incidente</label>
                    <select name="tipoSeleccionado" class="form-select" required>
                        <option value="" disabled selected>Seleccione una categoría...</option>
                        <option th:each="t : ${listaTipos}" 
                                th:value="${t.tipo}" 
                                th:text="${t.tipo}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción Detallada</label>
                    <textarea name="descripcion" class="form-control" rows="4" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Región</label>
                    <input type="text" name="region" class="form-control" required>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-warning btn-lg">Enviar Reporte</button>
                    <a href="/dashboard" class="btn btn-outline-secondary">Volver al Dashboard</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
