<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Solicitudes de: <span class="text-primary" th:text="${empresa.nombre}"></span></h2>
        <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Descripción</th>
                        <th>Peso</th>
                        <th>Ubicación</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sol : ${listaSolicitudes}">
                        <td th:text="${sol.descripcion}"></td>
                        <td th:text="${sol.peso} + ' kg'"></td>
                        <td th:text="${sol.ubicacion}"></td>
                        <td th:text="${sol.tipo}"></td>
                        <td>
                            <span th:classappend="${sol.atendiada} ? 'badge bg-success' : 'badge bg-warning'"
                                  th:text="${sol.atendiada} ? 'Atendida' : 'Pendiente'">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
