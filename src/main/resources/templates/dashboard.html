<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Solicitudes y Planes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .table-responsive { overflow-x: auto; }
        .small-text { font-size: 0.85rem; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard</h2>
        <a href="/" class="btn btn-outline-danger">Cerrar Sesión</a>
    </div>

    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#solicitudes" type="button">Solicitudes</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#planes" type="button">Planes de Vuelo</button>
        </li>
    </ul>

    <div class="tab-content p-4 bg-white border border-top-0 rounded-bottom">
        
        <div class="tab-pane fade show active" id="solicitudes">
            <table class="table table-hover align-middle small-text">
                <thead class="table-dark">
                    <tr>
                        <th>Descripción</th>
                        <th>Peso</th>
                        <th>Ubicación</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sol : ${listaSolicitudes}">
                        <td th:text="${sol.descripcion}"></td>
                        <td th:text="${sol.peso} + ' kg'"></td>
                        <td th:text="${sol.ubicacion}"></td>
                        <td th:text="${sol.tipo}"></td>
                        <td>
                            <span th:classappend="${sol.atendiada} ? 'badge bg-success' : 'badge bg-warning'"
                                  th:text="${sol.atendiada} ? 'Atendida' : 'Pendiente'"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="planes">
            <div class="table-responsive">
                <table class="table table-hover align-middle small-text">
                    <thead class="table-primary">
                        <tr>
                            <th>Código</th>
                            <th>Registro</th>
                            <th>Fecha</th>
                            <th>GPS</th>
                            <th>Alt. Máx</th>
                            <th>Región</th>
                            <th>Estado</th>
                            <th>Piloto</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="plan : ${listaPlanes}">
                            <td th:text="${plan.codigoVuelo}"></td>
                            <td th:text="${plan.numeroRegistro}"></td>
                            <td th:text="${plan.fechaPV != null} ? ${#temporals.format(plan.fechaPV, 'dd/MM/yy HH:mm')} : '-'"></td>
                            <td th:text="${plan.psGPS}"></td>
                            <td th:text="${plan.altMax} + ' m'"></td>
                            <td th:text="${plan.region}"></td>
                            <td><span class="badge bg-info" th:text="${plan.estadoPV}"></span></td>
                            <td>
                                <div th:if="${plan.pilotoDTO != null}">
                                    <strong th:text="${plan.pilotoDTO.primerNombre} + ' ' + ${plan.pilotoDTO.apellidoPaterno}"></strong><br>
                                    <small class="text-muted" th:text="${plan.pilotoDTO.rutPiloto}"></small>
                                </div>
                                <span th:if="${plan.pilotoDTO == null}">Sin Piloto</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
